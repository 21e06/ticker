<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0d1117">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="description" content="BTC/USD Index Monitor - Real-time Bitcoin price tracking with TradingView charts">

    <title>BTC/USD Monitor</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0d1117;
            color: #e6edf3;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: #161b22;
            border-bottom: 1px solid #30363d;
            flex-shrink: 0;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #f7931a, #ffad33);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
            color: #fff;
        }

        .logo-text {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .logo-text span {
            color: #f7931a;
        }

        .price-ticker {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .price-main {
            font-size: 20px;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
        }

        .price-change {
            font-size: 13px;
            font-weight: 600;
            padding: 4px 8px;
            border-radius: 6px;
            font-variant-numeric: tabular-nums;
        }

        .price-change.up {
            background: rgba(35, 197, 94, 0.15);
            color: #23c55e;
        }

        .price-change.down {
            background: rgba(239, 68, 68, 0.15);
            color: #ef4444;
        }

        .chart-container {
            flex: 1;
            position: relative;
            min-height: 0;
        }

        .tradingview-widget-container {
            width: 100%;
            height: 100%;
        }

        .stats-bar {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1px;
            background: #30363d;
            flex-shrink: 0;
        }

        .stat-item {
            background: #161b22;
            padding: 10px 8px;
            text-align: center;
        }

        .stat-label {
            font-size: 10px;
            color: #8b949e;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .stat-value {
            font-size: 13px;
            font-weight: 600;
            font-variant-numeric: tabular-nums;
            color: #e6edf3;
        }

        .toolbar {
            display: flex;
            gap: 8px;
            padding: 8px 16px;
            background: #161b22;
            border-top: 1px solid #30363d;
            overflow-x: auto;
            flex-shrink: 0;
            -webkit-overflow-scrolling: touch;
        }

        .toolbar::-webkit-scrollbar {
            display: none;
        }

        .time-btn {
            background: #21262d;
            border: 1px solid #30363d;
            color: #8b949e;
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
            font-family: inherit;
        }

        .time-btn:hover {
            background: #30363d;
            color: #e6edf3;
        }

        .time-btn.active {
            background: #f7931a;
            border-color: #f7931a;
            color: #0d1117;
        }

        .install-btn {
            background: #238636;
            border: none;
            color: #fff;
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: none;
            font-family: inherit;
        }

        .install-btn.visible {
            display: block;
        }

        .install-btn:hover {
            background: #2ea043;
        }

        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #0d1117;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            transition: opacity 0.5s;
        }

        .loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #30363d;
            border-top-color: #f7931a;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            margin-top: 16px;
            color: #8b949e;
            font-size: 14px;
        }

        @media (max-width: 480px) {
            .header {
                padding: 10px 12px;
            }

            .logo-text {
                font-size: 16px;
            }

            .price-main {
                font-size: 16px;
            }

            .stat-item {
                padding: 8px 4px;
            }

            .stat-value {
                font-size: 11px;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="header">
            <div class="logo">
                <div class="logo-icon">₿</div>
                <div class="logo-text">BTC<span>/USD</span></div>
            </div>
            <div class="price-ticker">
                <div class="price-main" id="currentPrice">--</div>
                <div class="price-change" id="priceChange">--</div>
                <button class="install-btn" id="installBtn">Install App</button>
            </div>
        </header>

        <div class="chart-container">
            <div class="loading-overlay" id="loadingOverlay">
                <div class="spinner"></div>
                <div class="loading-text">Loading chart...</div>
            </div>
            <div class="tradingview-widget-container" id="tradingview_widget"></div>
        </div>

        <div class="stats-bar">
            <div class="stat-item">
                <div class="stat-label">24h High</div>
                <div class="stat-value" id="high24">--</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">24h Low</div>
                <div class="stat-value" id="low24">--</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">24h Vol</div>
                <div class="stat-value" id="vol24">--</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">Market Cap</div>
                <div class="stat-value" id="mktCap">--</div>
            </div>
        </div>

        <div class="toolbar">
            <button class="time-btn" data-interval="1">1m</button>
            <button class="time-btn" data-interval="5">5m</button>
            <button class="time-btn active" data-interval="15">15m</button>
            <button class="time-btn" data-interval="60">1H</button>
            <button class="time-btn" data-interval="240">4H</button>
            <button class="time-btn" data-interval="D">1D</button>
            <button class="time-btn" data-interval="W">1W</button>
        </div>
    </div>

    <script>
        // TradingView Widget Configuration
        let tvWidget = null;
        let currentInterval = '15';

        function initTradingView(interval) {
            const container = document.getElementById('tradingview_widget');
            container.innerHTML = '';

            const script = document.createElement('script');
            script.src = 'https://s3.tradingview.com/tv.js';
            script.async = true;
            script.onload = function() {
                tvWidget = new TradingView.widget({
                    autosize: true,
                    symbol: 'BINANCE:BTCUSDT',
                    interval: interval,
                    timezone: 'exchange',
                    theme: 'dark',
                    style: '1',
                    locale: 'en',
                    toolbar_bg: '#161b22',
                    enable_publishing: false,
                    allow_symbol_change: false,
                    save_image: false,
                    container_id: 'tradingview_widget',
                    hide_top_toolbar: false,
                    hide_legend: false,
                    hide_side_toolbar: false,
                    details: true,
                    hotlist: false,
                    calendar: false,
                    studies: ['MASimple@tv-basicstudies', 'RSI@tv-basicstudies'],
                    show_popup_button: false,
                    popup_width: '1000',
                    popup_height: '650',
                    disabled_features: [
                        'use_localstorage_for_settings',
                        'volume_force_overlay',
                        'header_symbol_search',
                        'header_compare',
                        'header_screenshot',
                        'header_chart_type',
                        'header_undo_redo',
                        'header_settings',
                        'header_fullscreen_button'
                    ],
                    enabled_features: [
                        'study_templates',
                        'hide_left_toolbar_by_default'
                    ],
                    overrides: {
                        'mainSeriesProperties.candleStyle.upColor': '#23c55e',
                        'mainSeriesProperties.candleStyle.downColor': '#ef4444',
                        'mainSeriesProperties.candleStyle.borderUpColor': '#23c55e',
                        'mainSeriesProperties.candleStyle.borderDownColor': '#ef4444',
                        'mainSeriesProperties.candleStyle.wickUpColor': '#23c55e',
                        'mainSeriesProperties.candleStyle.wickDownColor': '#ef4444',
                        'paneProperties.background': '#0d1117',
                        'paneProperties.vertGridProperties.color': '#21262d',
                        'paneProperties.horzGridProperties.color': '#21262d',
                        'scalesProperties.textColor': '#8b949e',
                        'scalesProperties.lineColor': '#30363d'
                    }
                });

                setTimeout(() => {
                    document.getElementById('loadingOverlay').classList.add('hidden');
                }, 2000);
            };

            document.head.appendChild(script);
        }

        // Price fetching
        async function fetchPrice() {
            try {
                const response = await fetch('https://api.binance.com/api/v3/ticker/24hr?symbol=BTCUSDT');
                const data = await response.json();

                const price = parseFloat(data.lastPrice);
                const change = parseFloat(data.priceChangePercent);
                const high = parseFloat(data.highPrice);
                const low = parseFloat(data.lowPrice);
                const vol = parseFloat(data.volume);
                const quoteVol = parseFloat(data.quoteVolume);

                document.getElementById('currentPrice').textContent = '$' + price.toLocaleString('en-US', {
                    minimumFractionDigits: 2,
                    maximumFractionDigits: 2
                });

                const changeEl = document.getElementById('priceChange');
                changeEl.textContent = (change >= 0 ? '+' : '') + change.toFixed(2) + '%';
                changeEl.className = 'price-change ' + (change >= 0 ? 'up' : 'down');

                document.getElementById('high24').textContent = '$' + high.toLocaleString('en-US', {
                    minimumFractionDigits: 0,
                    maximumFractionDigits: 0
                });

                document.getElementById('low24').textContent = '$' + low.toLocaleString('en-US', {
                    minimumFractionDigits: 0,
                    maximumFractionDigits: 0
                });

                document.getElementById('vol24').textContent = (vol / 1000).toFixed(1) + 'K BTC';

                // Approximate market cap (circulating supply ~19.7M)
                const mktCap = price * 19700000;
                document.getElementById('mktCap').textContent = '$' + (mktCap / 1e12).toFixed(2) + 'T';

            } catch (e) {
                console.error('Price fetch error:', e);
            }
        }

        // Time interval buttons
        document.querySelectorAll('.time-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentInterval = this.dataset.interval;
                document.getElementById('loadingOverlay').classList.remove('hidden');
                initTradingView(currentInterval);
            });
        });

        // PWA Install
        let deferredPrompt;
        const installBtn = document.getElementById('installBtn');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installBtn.classList.add('visible');
        });

        installBtn.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    installBtn.classList.remove('visible');
                }
                deferredPrompt = null;
            }
        });

        // Service Worker for PWA
        if ('serviceWorker' in navigator) {
            const swCode = `
                self.addEventListener('install', e => {
                    e.waitUntil(self.skipWaiting());
                });
                self.addEventListener('activate', e => {
                    e.waitUntil(self.clients.claim());
                });
                self.addEventListener('fetch', e => {
                    e.respondWith(fetch(e.request).catch(() => new Response('Offline')));
                });
            `;

            const blob = new Blob([swCode], { type: 'application/javascript' });
            const swUrl = URL.createObjectURL(blob);

            navigator.serviceWorker.register(swUrl).catch(err => {
                console.log('SW registration failed:', err);
            });
        }

        // Initialize
        initTradingView('15');
        fetchPrice();
        setInterval(fetchPrice, 5000);
    </script>
</body>
</html>
